{% extends "base.html" %}

{% block content %}
  <div class="max-w-md mx-auto mt-10">
    <h2 class="text-2xl font-bold mb-4">Sign Up</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Register</button>
    </form>
  </div>
{% endblock %}
